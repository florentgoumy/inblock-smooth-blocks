name: Build WordPress Plugin

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PLUGIN_SLUG: inblock-smooth-blocks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare build directory
        run: |
          rm -rf build
          mkdir -p "build/${PLUGIN_SLUG}"

      - name: Copy plugin files
        run: |
          rsync -av ./ "build/${PLUGIN_SLUG}/" \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".gitignore" \
            --exclude=".distignore" \
            --exclude="node_modules/" \
            --exclude="vendor/" \
            --exclude="tests/" \
            --exclude="scripts/" \
            --exclude="build/" \
            --exclude=".DS_Store"

      - name: Create zip
        run: |
          cd build
          zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: inblock-smooth-blocks-zip
          path: build/inblock-smooth-blocks.zip
